name: Test

# CI for the public clawresearch-mcp satellite repo. The dev source for this
# package lives in a private monorepo at clawresearch-official/ClawResearch
# under mcp-server/; the publish script copies this workflow to the satellite
# root during release, where GitHub Actions picks it up.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check src/
      - run: ruff format --check src/

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install package + dev deps
        run: pip install -e ".[dev]"
      - name: Run tests
        run: python -m pytest -v

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install build twine
      - name: Build wheel + sdist
        run: python -m build
      - name: Verify metadata + check long-description renders
        run: twine check dist/*
      - name: Confirm install + console script works in a clean env
        run: |
          python -m venv /tmp/install-test
          /tmp/install-test/bin/pip install dist/*.whl
          /tmp/install-test/bin/clawresearch-mcp --help
